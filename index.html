<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaman Araçları</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Top Right Nav -->
    <div class="nav-container">
        <button class="nav-btn active" data-target="stopwatch-tab">Kronometre</button>
        <button class="nav-btn" data-target="timer-tab">Zamanlayıcı</button>
        <button class="nav-btn" data-target="alarm-tab">Alarm</button>
    </div>

    <!-- Alarm Audio Element (hidden) -->
    <audio id="alarmSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"
        preload="auto"></audio>

    <div class="container">
        <!-- 1. KRONOMETRE -->
        <div id="stopwatch-tab" class="timer-card active-tab">
            <h1>Kronometre</h1>
            <div class="time-display">
                <span id="sw-hours">00</span><span class="colon">:</span><span id="sw-minutes">00</span><span
                    class="colon">:</span><span id="sw-seconds">00</span><span class="milliseconds"
                    id="sw-milliseconds">.00</span>
            </div>
            <div class="controls">
                <button id="sw-startBtn" class="btn primary">Başlat</button>
                <button id="sw-stopBtn" class="btn secondary">Durdur</button>
                <button id="sw-resetBtn" class="btn danger">Sıfırla</button>
            </div>
        </div>

        <!-- 2. ZAMANLAYICI (TIMER) -->
        <div id="timer-tab" class="timer-card">
            <h1>Zamanlayıcı</h1>

            <div id="timer-setup" class="timer-setup">
                <div class="input-group">
                    <input type="number" id="t-input-hours" min="0" max="99" value="0" placeholder="00">
                    <label>Saat</label>
                </div>
                <div class="input-group">
                    <input type="number" id="t-input-minutes" min="0" max="59" value="5" placeholder="00">
                    <label>Dakika</label>
                </div>
                <div class="input-group">
                    <input type="number" id="t-input-seconds" min="0" max="59" value="0" placeholder="00">
                    <label>Saniye</label>
                </div>
            </div>

            <div id="timer-running" class="time-display hidden">
                <span id="t-hours">00</span><span class="colon">:</span><span id="t-minutes">00</span><span
                    class="colon">:</span><span id="t-seconds">00</span>
            </div>

            <div class="controls">
                <button id="t-startBtn" class="btn primary">Başlat</button>
                <button id="t-stopBtn" class="btn secondary hidden">Duraklat</button>
                <button id="t-resetBtn" class="btn danger">İptal / Sıfırla</button>
            </div>
        </div>

        <!-- 3. ALARM -->
        <div id="alarm-tab" class="timer-card">
            <h1>Alarm</h1>

            <div class="current-time-display">
                Şu An: <span id="current-time">00:00:00</span>
            </div>

            <div class="alarm-setup">
                <input type="time" id="alarm-time-input" class="time-picker" required>
                <button id="alarm-addBtn" class="btn primary">Alarm Kur</button>
            </div>

            <div class="alarm-list-container">
                <h3>Kurulu Alarmlar</h3>
                <ul id="alarm-list" class="alarm-list">
                    <!-- Alarms will be added here -->
                    <li class="empty-list">Henüz alarm kurulmadı.</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Alarm Modal / Notification -->
    <div id="alarm-modal" class="modal-overlay hidden">
        <div class="modal">
            <h2>⏰ ALARM!</h2>
            <p id="alarm-msg">Vakit geldi!</p>
            <button id="alarm-stopSoundBtn" class="btn danger">Sustur</button>
        </div>
    </div>

    <!-- dayjs + duration eklentisi (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/duration.min.js"></script>
    <script>dayjs.extend(dayjs_plugin_duration);</script>

    <!-- Modüler JS dosyaları (sıra önemli) -->
    <script src="js/navigation.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/stopwatch.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/alarm.js"></script>
</body>

</html>
